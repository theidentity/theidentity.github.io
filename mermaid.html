<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mermaid Exporter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.9.0/mermaid.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1117; color: #e2e8f0;
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }
  header {
    padding: 12px 18px; background: #161b27;
    border-bottom: 1px solid #2d3748;
    display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  header h1 { font-size: 14px; font-weight: 600; color: #f0f4f8; }
  header span { font-size: 11px; color: #64748b; margin-left: auto; }
  .main {
    display: grid; grid-template-columns: 1fr 1fr;
    flex: 1; overflow: hidden;
  }
  .panel { display: flex; flex-direction: column; overflow: hidden; }
  .panel-header {
    padding: 7px 14px; background: #161b27;
    border-bottom: 1px solid #2d3748;
    font-size: 10px; font-weight: 700; color: #64748b;
    text-transform: uppercase; letter-spacing: 0.08em;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  #editor {
    flex: 1; background: #0d1117; color: #a8d8a8;
    border: none; outline: none; padding: 14px;
    font-family: 'Fira Code', 'Cascadia Code', monospace;
    font-size: 12px; line-height: 1.65; resize: none;
    border-right: 1px solid #2d3748; tab-size: 2;
  }
  #editor::placeholder { color: #2d3748; }
  .preview-panel { display: flex; flex-direction: column; }
  #viewport {
    flex: 1; overflow: hidden; position: relative;
    cursor: grab; background: #f8fafc;
    background-image: radial-gradient(circle, #cbd5e1 1px, transparent 1px);
    background-size: 20px 20px;
  }
  #viewport.grabbing { cursor: grabbing; }
  #canvas {
    position: absolute; top: 0; left: 0;
    transform-origin: 0 0; will-change: transform;
  }
  #diagram-container { padding: 20px; }
  #diagram-container svg { display: block; }
  .placeholder-text {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #94a3b8; font-size: 13px; pointer-events: none;
  }
  .error-box {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: #fef2f2; border: 1px solid #fca5a5;
    border-radius: 8px; padding: 14px; color: #dc2626;
    font-size: 11px; font-family: monospace; white-space: pre-wrap;
    max-width: 340px; width: 90%;
  }
  .zoom-controls {
    position: absolute; bottom: 10px; right: 10px;
    display: flex; flex-direction: column; gap: 3px; z-index: 10;
  }
  .zoom-btn {
    width: 26px; height: 26px; background: #fff;
    border: 1px solid #cbd5e1; border-radius: 5px;
    color: #475569; font-size: 15px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 3px rgba(0,0,0,.1);
  }
  .zoom-btn:hover { background: #f1f5f9; }
  .zoom-label {
    background: #fff; border: 1px solid #cbd5e1; border-radius: 5px;
    color: #64748b; font-size: 10px; text-align: center;
    padding: 3px 2px; cursor: pointer;
    box-shadow: 0 1px 3px rgba(0,0,0,.1);
  }
  .zoom-label:hover { background: #f1f5f9; }
  .actions {
    padding: 9px 14px; background: #161b27;
    border-top: 1px solid #2d3748;
    display: flex; gap: 8px; align-items: center; flex-shrink: 0;
  }
  select {
    background: #1e2535; color: #e2e8f0;
    border: 1px solid #2d3748; border-radius: 6px;
    padding: 5px 8px; font-size: 11px; cursor: pointer; outline: none;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 6px 13px; border-radius: 6px;
    font-size: 12px; font-weight: 500; cursor: pointer; border: none;
    transition: all 0.15s;
  }
  .btn-render { background: #2d1e4f; color: #c4b5fd; border: 1px solid #7c3aed44; }
  .btn-render:hover { background: #7c3aed; color: #fff; }
  .btn-svg { background: #1e3a5f; color: #93c5fd; border: 1px solid #2563eb44; }
  .btn-svg:hover:not(:disabled) { background: #1d4ed8; color: #fff; }
  .btn-png { background: #1a3a2a; color: #86efac; border: 1px solid #16a34a44; }
  .btn-png:hover:not(:disabled) { background: #15803d; color: #fff; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .scale-label { font-size: 11px; color: #64748b; margin-left: auto; }
</style>
</head>
<body>
<header>
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 12h8M12 8v8"/></svg>
  <h1>Mermaid Exporter</h1>
  <span>Scroll to zoom · Drag to pan</span>
</header>

<div class="main">
  <div class="panel">
    <div class="panel-header">
      <span>Source</span>
      <button class="btn btn-render" onclick="render()">▶ Render</button>
    </div>
    <textarea id="editor" placeholder="Paste your Mermaid diagram here...

Example:
graph TD
    A[Start] --> B{Decision}
    B -->|Yes| C[Do something]
    B -->|No| D[Do nothing]
    C --> E[End]
    D --> E"></textarea>
  </div>

  <div class="panel preview-panel">
    <div class="panel-header">
      <span>Preview</span>
      <span id="sizeBadge" style="font-size:10px;color:#94a3b8">—</span>
    </div>
    <div id="viewport">
      <div id="canvas">
        <div id="diagram-container"></div>
      </div>
      <div class="placeholder-text" id="placeholder">Your diagram will appear here</div>
      <div class="zoom-controls">
        <button class="zoom-btn" onclick="zoomStep(0.25)">+</button>
        <div class="zoom-label" id="zoomLabel" onclick="resetView()" title="Reset view">100%</div>
        <button class="zoom-btn" onclick="zoomStep(-0.25)">−</button>
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-svg" id="svgBtn" onclick="downloadSVG()" disabled>↓ SVG</button>
      <button class="btn btn-png" id="pngBtn" onclick="downloadPNG()" disabled>↓ PNG</button>
      <span id="statusMsg" style="display:none;font-size:10px;color:#4ade80">✓ Downloaded!</span>
      <span class="scale-label">PNG scale:</span>
      <select id="scaleSelect">
        <option value="2">2× HD</option>
        <option value="3" selected>3× Full HD</option>
        <option value="4">4× 4K</option>
        <option value="6">6× Ultra</option>
      </select>
    </div>
  </div>
</div>

<script>
mermaid.initialize({
  startOnLoad: false,
  theme: 'default',
  securityLevel: 'loose',
});

let currentSVG = null;
let scale = 1, tx = 40, ty = 40;
let dragging = false, lastX, lastY;

const viewport = document.getElementById('viewport');
const canvas   = document.getElementById('canvas');
const editor   = document.getElementById('editor');

viewport.addEventListener('mousedown', e => {
  dragging = true; lastX = e.clientX; lastY = e.clientY;
  viewport.classList.add('grabbing');
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  tx += e.clientX - lastX; ty += e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  applyTransform();
});
window.addEventListener('mouseup', () => {
  dragging = false; viewport.classList.remove('grabbing');
});

viewport.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = viewport.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  const ns = Math.min(10, Math.max(0.05, scale * factor));
  tx = mx - (mx - tx) * (ns / scale);
  ty = my - (my - ty) * (ns / scale);
  scale = ns;
  applyTransform();
}, { passive: false });

function zoomStep(d) {
  const rect = viewport.getBoundingClientRect();
  const cx = rect.width / 2, cy = rect.height / 2;
  const ns = Math.min(10, Math.max(0.05, scale + d));
  tx = cx - (cx - tx) * (ns / scale);
  ty = cy - (cy - ty) * (ns / scale);
  scale = ns;
  applyTransform();
}

function applyTransform() {
  canvas.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  document.getElementById('zoomLabel').textContent = Math.round(scale * 100) + '%';
}

function resetView() {
  if (!currentSVG) return;
  const vr = viewport.getBoundingClientRect();
  const sw = currentSVG.scrollWidth || 400;
  const sh = currentSVG.scrollHeight || 300;
  scale = Math.min((vr.width - 80) / sw, (vr.height - 80) / sh, 2);
  tx = (vr.width  - sw * scale) / 2;
  ty = (vr.height - sh * scale) / 2;
  applyTransform();
}

editor.addEventListener('paste', () => setTimeout(render, 100));
editor.addEventListener('keydown', e => {
  if (e.key !== 'Tab') return;
  e.preventDefault();
  const s = editor.selectionStart;
  editor.value = editor.value.slice(0, s) + '  ' + editor.value.slice(editor.selectionEnd);
  editor.selectionStart = editor.selectionEnd = s + 2;
});

async function render() {
  const code = editor.value.trim();
  const container = document.getElementById('diagram-container');
  const placeholder = document.getElementById('placeholder');
  clearError();

  if (!code) {
    container.innerHTML = ''; currentSVG = null;
    placeholder.style.display = '';
    setButtons(false); return;
  }

  placeholder.style.display = 'none';
  try {
    const uid = 'mm' + Date.now();
    const { svg } = await mermaid.render(uid, code);
    container.innerHTML = svg;
    currentSVG = container.querySelector('svg');
    currentSVG.style.display = 'block';

    const vb = currentSVG.viewBox?.baseVal;
    document.getElementById('sizeBadge').textContent =
      vb && vb.width ? `${Math.round(vb.width)} × ${Math.round(vb.height)} px` : '';

    requestAnimationFrame(resetView);
    setButtons(true);
  } catch (err) {
    container.innerHTML = '';
    showError(err.message || String(err));
    currentSVG = null; setButtons(false);
  }
}

function setButtons(on) {
  document.getElementById('svgBtn').disabled = !on;
  document.getElementById('pngBtn').disabled = !on;
}
function showError(msg) {
  clearError();
  const el = document.createElement('div');
  el.className = 'error-box'; el.id = 'errBox';
  el.textContent = '⚠ Parse error:\n\n' + msg;
  viewport.appendChild(el);
}
function clearError() {
  const el = document.getElementById('errBox');
  if (el) el.remove();
}

function buildSVGString() {
  if (!currentSVG) return null;
  const clone = currentSVG.cloneNode(true);
  const vb = currentSVG.viewBox?.baseVal;
  if (vb && vb.width) {
    clone.setAttribute('width',  vb.width);
    clone.setAttribute('height', vb.height);
  }
  const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  bg.setAttribute('width', '100%'); bg.setAttribute('height', '100%');
  bg.setAttribute('fill', 'white');
  clone.insertBefore(bg, clone.firstChild);
  return new XMLSerializer().serializeToString(clone);
}

function triggerDownload(dataUrl, filename) {
  const a = document.createElement('a');
  a.href = dataUrl; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  const msg = document.getElementById('statusMsg');
  msg.style.display = 'inline';
  setTimeout(() => msg.style.display = 'none', 2500);
}

function downloadSVG() {
  const s = buildSVGString(); if (!s) return;
  triggerDownload('data:image/svg+xml;charset=utf-8,' + encodeURIComponent(s), 'diagram.svg');
}

function downloadPNG() {
  const s = buildSVGString(); if (!s || !currentSVG) return;
  const px = parseInt(document.getElementById('scaleSelect').value);
  const vb = currentSVG.viewBox?.baseVal;
  const w = (vb && vb.width)  ? vb.width  : currentSVG.scrollWidth  || 800;
  const h = (vb && vb.height) ? vb.height : currentSVG.scrollHeight || 600;
  const img = new Image();
  img.onload = () => {
    const c = document.createElement('canvas');
    c.width = w * px; c.height = h * px;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, c.width, c.height);
    ctx.drawImage(img, 0, 0, c.width, c.height);
    triggerDownload(c.toDataURL('image/png'), `diagram_${px}x.png`);
  };
  img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(s);
}
</script>
</body>
</html>
